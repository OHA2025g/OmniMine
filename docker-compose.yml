services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: omnimine
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODEL: ${HF_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      SLA_CHECK_INTERVAL_SECONDS: ${SLA_CHECK_INTERVAL_SECONDS:-300}
      SLA_DUE_SOON_HOURS: ${SLA_DUE_SOON_HOURS:-2}
      MONITORING_TICK_SECONDS: ${MONITORING_TICK_SECONDS:-5}
    ports:
      - "8001:8001"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:8001
    restart: unless-stopped
    ports:
      - "4005:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
