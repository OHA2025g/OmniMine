name: ci

on:
  push:
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: omnimine-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: omnimine-frontend:ci

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (flake8)
        run: |
          flake8 backend/server.py backend/services

  rbac-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start mongo + backend
        run: |
          docker compose up -d --build mongo backend

      - name: Wait for backend health
        run: |
          for i in {1..120}; do
            h=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/healthz || true)
            r=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/readyz || true)
            if [ "$h" = "200" ] && [ "$r" = "200" ]; then
              echo "Backend is ready (healthz+readyz)"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          docker compose logs backend --tail=200 || true
          exit 1

      - name: Run RBAC permission matrix smoke test
        run: |
          python3 backend/scripts/rbac_permission_matrix_smoke_test.py

      - name: Tear down
        if: always()
        run: |
          docker compose down -v

  admin-console-api-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start mongo + backend
        run: |
          docker compose up -d --build mongo backend

      - name: Wait for backend readiness
        run: |
          for i in {1..120}; do
            h=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/healthz || true)
            r=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/readyz || true)
            if [ "$h" = "200" ] && [ "$r" = "200" ]; then
              echo "Backend is ready (healthz+readyz)"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          docker compose logs backend --tail=200 || true
          exit 1

      - name: Run Admin Console end-to-end API validation
        run: |
          python3 backend/scripts/admin_console_e2e_api_validation.py

      - name: Tear down
        if: always()
        run: |
          docker compose down -v

